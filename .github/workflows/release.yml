name: Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  # Only run when a release/* PR is merged (not closed without merge)
  check:
    if: github.event.pull_request.merged == true && startsWith(github.event.pull_request.head.ref, 'release/v')
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.extract.outputs.version }}
    steps:
      - name: Extract version from branch name
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          VERSION="${BRANCH#release/v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Releasing v${VERSION}"

  # ── 1. Build + test gate ─────────────────────────────────────────────────
  verify:
    needs: check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - run: npm ci
      - run: npm run build
      - run: node --test test/*.test.mjs

  # ── 2. Tag + GitHub Release → triggers publish.yml (npm) ────────────────
  github-release:
    needs: [check, verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Create tag and GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          git tag "v${VERSION}"
          git push origin "v${VERSION}"
          gh release create "v${VERSION}" --generate-notes --title "v${VERSION}"

  # ── 3. Publish to ClawHub ──────────────────────────────────────────────
  clawhub-publish:
    needs: [check, verify]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Publish skill to ClawHub
        env:
          CLAWHUB_TOKEN: ${{ secrets.CLAWHUB_TOKEN }}
          VERSION: ${{ needs.check.outputs.version }}
        run: |
          npx clawhub@latest auth login --token "$CLAWHUB_TOKEN" --no-browser
          npx clawhub@latest publish "$(pwd)/skills/declaw" --version "$VERSION"

  # ── 4. Backmerge main → develop ────────────────────────────────────────
  backmerge:
    needs: github-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Merge main into develop
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout develop
          git merge main --no-edit
          git push origin develop
